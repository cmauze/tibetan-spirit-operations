# sanitize.yaml — Defines text replacements from project skills/ (operational)
# to plugin skills/ (public-distributable).
#
# Usage: scripts/publish-plugin.sh reads this file and applies replacements.
# Project skills/ is the canonical operational version.
# Plugin skills/ is auto-generated — do not edit directly.
#
# Ordering matters: more specific (longer) phrases must appear BEFORE shorter ones
# that share substrings, to avoid partial matches corrupting later replacements.
#
# Divergent skills: campaign-brief, cs-workflow, cs-triage, description-optimizer,
#                   fulfillment-flag, margin-reporting, order-inquiry, restock-calc,
#                   shopify-query (all 9 skills diverge)

