  - from: "Spiritual guidance emails MUST be checked FIRST before any other classification. If the email contains spiritual guidance requests, it escalates immediately to `spiritual-director` — no draft is created, no automated response is attempted. This is a non-negotiable cultural and business requirement."
    to: "Brand-sensitive emails MUST be checked FIRST before any other classification. If the email contains questions about brand values, cultural significance, or product authenticity that require specialist knowledge, it escalates immediately to `brand-specialist` — no draft is created, no automated response is attempted."

